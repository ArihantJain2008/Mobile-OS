<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dial</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<body>
    <header>
        <div class="time">
            <p id="time"></p>
        </div>
        <div class="status_icons">
            <div class="wifi">
                <span class="dot"></span>
                <span class="arc arc1"></span>
                <span class="arc arc2"></span>
                <span class="arc arc3"></span>
            </div>
            <div class="network"><i class="fa-solid fa-signal"></i></div>
            <div class="battery">
                <div id="level" class="level"></div>
                <h2 id="status" class="status">Checking battery...</h2>
            </div>
        </div>
    </header>
    <center>
    <div class="dialer">
        <div class="dialer_screen">
            <input type="text" id="number" placeholder="Enter number"readonly>
             <button onclick="backspace()">⌫</button>
        </div>
        <div class="dial_pad">
            <div class="row">
                <button onclick="typeValue('1')">1</button>
                <button onclick="typeValue('3')">3DEF</button>
                <button onclick="typeValue('2')">2ABC</button>
            </div>
            <div class="row">
                <button onclick="typeValue('4')">4GHI</button>
                <button onclick="typeValue('5')">5JKL</button>
                <button onclick="typeValue('6')">6MNO</button>
            </div>
            <div class="row">
                <button onclick="typeValue('7')">7PQR</button>
                <button onclick="typeValue('8')">8STU</button>
                <button onclick="typeValue('9')">9VWXZ</button>
            </div>
            <div class="row">
                <button onclick="typeValue('')">*</button>
                <button onclick="typeValue('0')">0+</button>
                <button onclick="typeValue('#')">#</button>
            </div>
        </div>
    </div>
    </center>
    <footer>
        <div class="icons">
            <a href="phone.html">
        <div class="phone">
            <i class="fa-solid fa-phone"></i>
        </div></a>
        <a href="message.html">
        <div class="message">
            <i class="fa-solid fa-message"></i>
        </div>
        </a>
        <a href="index.html">
        <div class="home">
            <i class="fa-solid fa-house"></i>
        </div></a>
        <div class="camera">
            <i class="fa-solid fa-camera"></i>
            </div>
            <a href="https://www.google.com/?zx=1757663714748&no_sw_cr=1">
            <div class="chrome">
                <i class="fa-brands fa-chrome"></i>
            </div>
            </a>
            </div>
    </footer>
</body>
</html>
