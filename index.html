<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile OS</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<body>
    <header>
        <div class="time">
            <p id="time"></p>
        </div>
        <div class="status_icons">
            <div class="wifi">
                <span class="dot"></span>
                <span class="arc arc1"></span>
                <span class="arc arc2"></span>
                <span class="arc arc3"></span>
            </div>
            <div class="network"><i class="fa-solid fa-signal"></i></div>
            <div class="battery">
                <div id="level" class="level"></div>
                <h2 id="status" class="status">Checking battery...</h2>
            </div>
        </div>
    </header>
    <div class="big_time">
        <center>
        <p id="big_time" style="margin-top:25px;"></p>
        <p id="date"  style="font-size:50px;"></p>
        </center>
    </div>
    <div class="flashlight">
        <i class="fa-solid fa-lightbulb"></i>
    </div>
    <footer>
        <div class="icons">
            <a href="phone.html">
        <div class="phone">
            <i class="fa-solid fa-phone"></i>
        </div></a>
        <a href="message.html">
        <div class="message">
            <i class="fa-solid fa-message"></i>
        </div>
        </a>
        <a href="index.html">
        <div class="home">
            <i class="fa-solid fa-house"></i>
        </div></a>
        <a href="camera.html">
        <div class="camera">
            <i class="fa-solid fa-camera"></i>
            </div>
            </a>
            <a href="https://www.google.com/?zx=1757663714748&no_sw_cr=1">
            <div class="chrome">
                <i class="fa-brands fa-chrome"></i>
            </div>
            </a>
            </div>
    </footer>
</body>
</html>
